<!DOCTYPE html>
<html>
<head>
    <title>NFL Teams - Between The Huddles AI</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            padding: 20px;
        }

        .team-card {
            background: #222;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
        }

        a {
            color: white;
            text-decoration: none;
        }

        .team-card:hover {
            background: #333;
        }
    </style>
</head>

<body>

<h1>NFL Teams</h1>

{% for team in teams %}

<a href="/team/{{ team.abbreviation }}">
    <div class="team-card">
        <h2>{{ team.name }}</h2>
        <p>
            {{ team.city }} | {{ team.conference }} {{ team.division }}
        </p>
    </div>
</a>

{% endfor %}

</body>
</html>
