<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NFL Teams - Between The Huddles AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#0f172a;
    color:#fff;
}

nav{
    background:#08111f;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 30px;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:24px;
    font-weight:bold;
    color:#4db3ff;
}

.logo img{
    width:42px;
    height:42px;
}

nav a{
    color:#fff;
    text-decoration:none;
    margin-left:18px;
    font-weight:bold;
}

nav a:hover{
    color:#4db3ff;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:30px 20px;
}

h1{
    margin-bottom:25px;
    font-size:40px;
}

.search{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:#fff;
    font-size:18px;
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.team-link{
    text-decoration:none;
    color:inherit;
}

.team-card{
    background:#1e293b;
    border-radius:12px;
    padding:20px;
    transition:.2s;
}

.team-card:hover{
    transform:translateY(-4px);
    background:#2b3b52;
}

.team-card img{
    width:70px;
    height:70px;
    margin-bottom:15px;
}

.team-card h2{
    margin-bottom:8px;
}

.team-card p{
    color:#cbd5e1;
    margin-bottom:4px;
}
</style>
</head>

<body>

<nav>

<div class="logo">
<img src="/static/images/logo.svg" alt="Logo">
<span>Between The Huddles AI</span>
</div>

<div>
<a href="/">Home</a>
<a href="/scores">Scores</a>
<a href="/standings">Standings</a>
</div>

</nav>

<div class="container">

<h1>All NFL Teams</h1>

<input
id="search"
class="search"
type="text"
placeholder="Search teams...">

<div class="grid">

{% for team in teams %}

<a class="team-link" href="/team/{{ team['slug'] }}">

<div class="team-card">

<img
src="/static/images/teams/{{ team.abbreviation|lower }}.png"
alt="{{ team.name }}">

<h2>{{ team.name }}</h2>

<p>{{ team.city }}</p>

<p>{{ team.conference }} • {{ team.division }}</p>

</div>

</a>

{% endfor %}

</div>

</div>

<script>
const search=document.getElementById("search");

search.addEventListener("keyup",function(){

const value=this.value.toLowerCase();

document.querySelectorAll(".team-link").forEach(function(team){

team.style.display=
team.innerText.toLowerCase().includes(value)
? "block"
: "none";

});

});
</script>

</body>
</html>
