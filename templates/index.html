<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NFL Teams - Between The Huddles AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:#08111f;
}

.logo{
font-size:28px;
font-weight:bold;
color:#45b3ff;
}

nav a{
color:white;
text-decoration:none;
margin-left:18px;
font-weight:bold;
}

nav a:hover{
color:#45b3ff;
}

.container{
max-width:1200px;
margin:auto;
padding:30px 20px;
}

h1{
margin-bottom:25px;
font-size:42px;
}

.search{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:10px;
margin-bottom:25px;
background:#1e293b;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}
.team-link{
    display:block;
    text-decoration:none;
    color:inherit;
}
.team-card{
background:#1e293b;
border-radius:12px;
padding:20px;
transition:.2s;
}

.team-card:hover{
transform:translateY(-4px);
background:#273449;
}

.team-card img{
width:72px;
height:72px;
margin-bottom:12px;
}

.team-card h2{
margin-bottom:8px;
}

.team-card p{
color:#cbd5e1;
}

a{
text-decoration:none;
color:inherit;
}

</style>
</head>

<body>

<nav>

<div class="logo">
Between The Huddles AI
</div>

<div>
<a href="/">Home</a>
<a href="/scores">Scores</a>
<a href="/standings">Standings</a>
</div>

</nav>

<div class="container">

<h1>All NFL Teams</h1>

<input
class="search"
id="search"
type="text"
placeholder="Search for a team...">

<div class="grid" id="teams">

{% for team in teams %}

<a href="/team/{{ team.slug }}" class="team-link">

<div class="team-card">

<img src="/static/images/teams/{{ team.abbreviation|lower }}.png">

<h2>{{ team.name }}</h2>

<p>{{ team.city }}</p>

<p>{{ team.conference }} • {{ team.division }}</p>

</div>

</a>

{% endfor %}

</div>

</div>

<script>

const search=document.getElementById("search");

search.addEventListener("keyup",function(){

const value=this.value.toLowerCase();

document.querySelectorAll(".team-link").forEach(function(team){

const text=team.innerText.toLowerCase();

team.style.display=text.includes(value)?"block":"none";

});

});

</script>

</body>
</html>
